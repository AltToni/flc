name: portable-windows

# Builds a single portable FLC.exe (no installer, no admin rights needed to RUN it).
# --no-bundle compiles the executable but skips MSI/updater packaging, so no
# code-signing keys (TAURI_SIGNING_PRIVATE_KEY) are required.
#
# Usage:
#   1. Commit this file to .github/workflows/portable-windows.yml
#   2. GitHub -> Actions tab -> "portable-windows" -> Run workflow
#   3. Open the finished run -> Artifacts -> download "flc-portable-windows"
#   4. Unzip -> flc.exe -> copy to the target PC and double-click.

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - uses: pnpm/action-setup@v6
        with:
          # This fork (v7.5.1) has no "packageManager" field and no lockfile,
          # so pnpm's version MUST be set here.
          # v9 is chosen on purpose: pnpm 10+ blocks dependency build scripts by
          # default, which can break tailwind-oxide / esbuild on this older repo.
          # NOTE: if you later push a package.json that DOES contain a
          # "packageManager" field, REMOVE these two lines to avoid a conflict.
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          # No "cache: pnpm" here on purpose: node cache needs a pnpm-lock.yaml,
          # which this fork doesn't ship. (If you push the lockfile from the zip,
          # you can add it back as:  cache: pnpm )

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build portable executable
        run: pnpm tauri build --no-bundle

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: flc-portable-windows
          path: src-tauri/target/release/*.exe
          if-no-files-found: error
