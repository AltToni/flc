name: portable-windows

# Builds a single portable FLC.exe (no installer, no admin rights needed to RUN it).
# FLC 7.5.1 is a BUN project (tauri.conf.json -> beforeBuildCommand: "bun run build"),
# so this workflow uses Bun, not pnpm. --no-bundle compiles the .exe and skips
# MSI/updater packaging, so no code-signing keys (TAURI_SIGNING_PRIVATE_KEY) are needed.
#
# Usage:
#   1. Commit this file to .github/workflows/portable-windows.yml
#   2. GitHub -> Actions tab -> "portable-windows" -> Run workflow
#   3. Open the finished run -> Artifacts -> download "flc-portable-windows"
#   4. Unzip -> flc.exe -> copy to the target PC and double-click.

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install

      # Runs the frontend build (bun run build) then compiles the Rust app.
      # --no-bundle => produces the raw exe, skips MSI + updater signing.
      - name: Build portable executable
        run: bunx tauri build --no-bundle

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: flc-portable-windows
          path: src-tauri/target/release/*.exe
          if-no-files-found: error
